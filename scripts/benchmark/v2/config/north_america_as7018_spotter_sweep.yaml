# target_coverage sweep for Spotter on the AS7018 probe corpus.
#
# Two families per t-value of target_coverage (Spotter's k·σ calibration knob,
# restored in 120c850):
#
#   • spotter_cbg_tNN          — MTL=planar_annulus (unweighted intersection).
#                                The natural pairing for a *pooled* LTD: every
#                                VP shares the same (mu, sigma), so weighting
#                                by exp(-rtt/tau) just re-encodes information
#                                that sigma(rtt) already carries.
#   • spotter_cbg_weighted_tNN — MTL=planar_annulus_weighted with
#                                highest_weight_only=true. Keep the lowest-RTT
#                                (tightest annulus) VPs only — acts as a
#                                denoising filter on top of the pooled LTD.
#
# NN is target_coverage × 100 (t100 = 1.0, t50 = 0.5).
#
# Reuses the same source_kwargs / fold layout as north_america_as7018.yaml.
#
# Run with:
#   snakemake -s scripts/benchmark/v2/Snakefile \
#       --configfile scripts/benchmark/v2/config/north_america_as7018_spotter_sweep.yaml -j 4

run_id: north_america_as7018_spotter_sweep
source: ripe_atlas_asn_corpora
setup: probes_to_anchors
slices: [fold_0, fold_1, fold_2, fold_3, fold_4]

source_kwargs:
  probe_data_dir: datasets/ripe_atlas/asn_corpora/probes/north_america
  probe_asn: 7018
  anchor_data_dir: datasets/ripe_atlas/asn_corpora/anchors/kfolds
  max_rtt_ms: 10000

enable_fallback: true
seed: 42

combos:
  # ---- Unweighted family (mtl=planar_annulus) --------------------------------
  - combo_id: spotter_cbg_t100
    ltd: normal_dist
    mtl: planar_annulus
    ctr: monte_carlo_medoid
    ltd_kwargs:
      n_bins: 40
      min_per_bin: 5
      deg_mu: 3
      deg_sigma: 2
      bin_size_ms: 5.0
      cutoff_min_points: 5
      target_coverage: 1.0
    mtl_kwargs:
      n_pts: 64
      enable_circle_filter: true
    ctr_kwargs:
      n_samples: 1024

  - combo_id: spotter_cbg_t90
    ltd: normal_dist
    mtl: planar_annulus
    ctr: monte_carlo_medoid
    ltd_kwargs:
      n_bins: 40
