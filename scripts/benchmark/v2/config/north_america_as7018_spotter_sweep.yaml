      deg_sigma: 2
      bin_size_ms: 5.0
      cutoff_min_points: 5
      target_coverage: 0.9
    mtl_kwargs:
      n_pts: 64
      enable_circle_filter: true
    ctr_kwargs:
      n_samples: 1024

  - combo_id: spotter_cbg_t80
