# Template benchmark config — 16 LTD x MTL x CTR combos.
#
# Use as a starting point for a new
# corpus: rename `run_id`, point `source_kwargs.csv_path` at your canonical CSV
# (see the canonical schema in scripts/benchmark/v2/sources/generic_csv.py),
# adjust `setup` if needed, and tune the K-fold knobs.
#
# Required canonical CSV columns:
#   vp_id, vp_lat, vp_lon, target_id, target_lat, target_lon, rtt_ms
# Optional columns (used by DistGeo stratification + metadata):
#   vp_asn, vp_country, target_asn, target_country
#
# If your CSV's columns don't match the canonical schema, add a one-shot
# rename helper alongside scripts/benchmark/v2/sources/canonicalize_vultr_csv.py.
#
# Run with:
#   snakemake -s scripts/benchmark/v2/Snakefile \
#       --configfile scripts/benchmark/v2/config/template.yaml -j 4

run_id: TEMPLATE_RUN_ID         # rename to your run id
source: generic_csv
setup: anchors_to_probes        # anchors are VPs, probes are eval targets (RIPE Atlas convention)
slices: [fold_0, fold_1, fold_2, fold_3, fold_4]

source_kwargs:
  csv_path: datasets/PATH_TO_YOUR_CANONICAL.csv   # canonical-schema CSV
  k: 5                                            # K-fold count
  seed: 42                                        # DistGeo RNG seed
  asn_bucket_top_n: 20                            # DistGeo: top-N ASN buckets

enable_fallback: true
seed: 42

combos:
  # ---- Vanilla CBG family ---------------------------------------------------
  - combo_id: vanilla_cbg
    ltd: low_envelope
    mtl: spherical_circle
    ctr: boundary_vertex_mean
    mtl_kwargs:
      speed_ratio: 0.6667
      enable_circle_filter: true

  - combo_id: vanilla_cbg_geo
    ltd: low_envelope
    mtl: planar_annulus_weighted
    ctr: geometric_centroid
    mtl_kwargs:
      n_pts: 64
      weight_tau_ms: 50.0
      enable_circle_filter: true
      highest_weight_only: true

  # ---- Million-scale variants ----------------------------------------------
  - combo_id: million_scale_cbg
    ltd: speed_of_internet
    mtl: spherical_circle
    ctr: boundary_vertex_mean
    ltd_kwargs:
      speed_ratio: 0.6667
    mtl_kwargs:
      speed_ratio: 0.6667
      enable_circle_filter: true

  - combo_id: million_scale_cbg_geo
    ltd: speed_of_internet
    mtl: planar_annulus_weighted
    ctr: geometric_centroid
    ltd_kwargs:
      speed_ratio: 0.6667
    mtl_kwargs:
      n_pts: 64
      weight_tau_ms: 50.0
      enable_circle_filter: true
      highest_weight_only: true

  # ---- Octant family --------------------------------------------------------
  - combo_id: octant_cbg
    ltd: bounded_spline
    mtl: planar_annulus_weighted
    ctr: monte_carlo_medoid
    ltd_kwargs:
      target_coverage: 0.9
      cutoff_min_points: 5
      fit_spline: true
      spline_n_knots: 4
      bin_size_ms: 5.0
    mtl_kwargs:
      n_pts: 64
      enable_circle_filter: true
      weight_tau_ms: 50.0
      weight_threshold: 0.9
    ctr_kwargs:
      n_samples: 1024

  - combo_id: octant_cbg_top
    ltd: bounded_spline
    mtl: planar_annulus_weighted
    ctr: monte_carlo_medoid
    ltd_kwargs:
      target_coverage: 0.9
      cutoff_min_points: 5
      fit_spline: true
      spline_n_knots: 4
      bin_size_ms: 5.0
    mtl_kwargs:
      n_pts: 64
      enable_circle_filter: true
      weight_tau_ms: 50.0
      highest_weight_only: true
    ctr_kwargs:
      n_samples: 1024

  - combo_id: octant_cbg_top_geo
    ltd: bounded_spline
    mtl: planar_annulus_weighted
    ctr: geometric_centroid
    ltd_kwargs:
      target_coverage: 0.9
      cutoff_min_points: 5
