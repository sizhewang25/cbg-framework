      weight_tau_ms: 50.0
      highest_weight_only: true

  - combo_id: spotter_cbg_c100
    ltd: normal_dist
    mtl: planar_annulus_weighted
    ctr: monte_carlo_medoid
    ltd_kwargs:
      n_bins: 40
      min_per_bin: 5
      deg_mu: 3
      deg_sigma: 2
      bin_size_ms: 5.0
      cutoff_min_points: 5
      target_coverage: 1.0
    mtl_kwargs:
      n_pts: 64
      enable_circle_filter: true
      weight_tau_ms: 50.0
      highest_weight_only: true
    ctr_kwargs:
      n_samples: 1024

  - combo_id: spotter_cbg_c100_geo
    ltd: normal_dist
    mtl: planar_annulus_weighted
