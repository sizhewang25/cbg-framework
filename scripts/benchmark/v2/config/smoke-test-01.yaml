# Smoke configuration for the v2 CBG benchmark.
#
# Drives one source × one small slice × four named variants spanning the
# Circle (vanilla / million-scale) and Annulus (octant / octant-weighted)
# families. Fast enough to run in a couple of minutes end-to-end; useful as
# a CI/dev sanity check before launching the full grid.
#
# Run with:
#   snakemake -s scripts/benchmark/v2/Snakefile \
#       --configfile scripts/benchmark/v2/config/smoke.yaml -j 4

run_id: smoke-test-01
source: generic_csv
setup: anchors_to_probes
slices: [all]

enable_fallback: true

# Run-level RNG seed. Per-target seeds are derived as
# numpy.random.SeedSequence([seed, target_index]) and applied to any
# stochastic stage (monte_carlo_medoid here). Override per-combo via a
# `seed:` key on the combo entry. Without a seed, MonteCarloMedoidCTR
# uses its own random seed (predictions vary run-to-run).
seed: 42

combos:
  # ---- Circle family ---------------------------------------------------------
  # Vanilla CBG: per-VP min-RTT-fit (low_envelope) + spherical intersection +
  # mean of feasible-region vertices. low_envelope takes no kwargs.
  - combo_id: vanilla_cbg
    ltd: low_envelope
    mtl: spherical_circle
    ctr: boundary_vertex_mean
    mtl_kwargs:
      speed_ratio: 0.6667           # 2/3 c — Internet speed-of-light fraction
      enable_circle_filter: true    # redundant-circle preprocessing (IMC 2012)
                # circle discretization for Shapely intersection

  # Million-scale variant: same skeleton as vanilla but the LTD is a closed-form
  # disk of radius (RTT/2) * speed. Pair the LTD and MTL speed_ratio for
  # self-consistency — both should describe the same physical bound.
  - combo_id: million_scale_cbg
    ltd: speed_of_internet
    mtl: spherical_circle
    ctr: boundary_vertex_mean
    ltd_kwargs:
      speed_ratio: 0.6667
    mtl_kwargs:
      speed_ratio: 0.6667
      enable_circle_filter: true

  # ---- Annulus family --------------------------------------------------------
  # Octant: per-VP RTT-to-distance learned as a (lower, upper) band; planar
  # intersection of those annuli; Monte Carlo Sobol sampling inside the
  # feasible region; sampled L1-medoid as the centroid.
  - combo_id: octant_cbg
    ltd: bounded_spline
    mtl: planar_annulus
    ctr: monte_carlo_medoid
    ltd_kwargs:
      target_coverage: 0.9          # band width target: ~90% of training pairs covered
      cutoff_min_points: 5          # min samples per VP before fitting a spline
      fit_spline: true              # else use per-bucket envelope only
      spline_n_knots: 4
      bin_size_ms: 5.0              # RTT bucket width for spline knots
    mtl_kwargs:
      n_pts: 64                     # circle discretization for Shapely intersection
      enable_circle_filter: true    # drop outer-disk-redundant constraints (filter_redundant_outer_disks)
    ctr_kwargs:
      n_samples: 1024               # power of 2 — Sobol sampler likes that

  # Spotter (Laki et al. 2011): pooled-normal RTT→distance model. One global
  # (mu(d), sigma(d), k) fit across all VPs, then per-VP prediction is
  # [mu±k·sigma] clipped to the 2/3c envelope. Same MTL+CTR as octant so the
  # head-to-head isolates the LTD: bounded-spline (per-VP band) vs Spotter
  # (pooled deg-3/deg-2 polynomials).
  - combo_id: spotter_cbg
    ltd: normal_dist
    mtl: planar_annulus
    ctr: monte_carlo_medoid
    ltd_kwargs:
      n_bins: 40                    # RTT bins used to estimate mu(d), sigma(d)
      min_per_bin: 5               # bins with fewer points are dropped before polyfit
      deg_mu: 3                     # mu(rtt) is a deg-3 polynomial
      deg_sigma: 2                  # sigma(rtt) is a deg-2 polynomial
      bin_size_ms: 5.0              # RTT bin width (ms)
      cutoff_min_points: 5         # right-edge cutoff: dense-bin support threshold
    mtl_kwargs:
      n_pts: 64                     # circle discretization for Shapely intersection
      enable_circle_filter: true    # drop outer-disk-redundant constraints (filter_redundant_outer_disks)
    ctr_kwargs:
      n_samples: 1024               # power of 2 — Sobol sampler likes that
