# Per-ASN VP corpus benchmark: Amazon AWS (AS16509) probes → 721 shared anchors.
#
# Five folds × the same combo set as ripe-smoke.yaml. RTTs come from the same
# `ping_10k_to_anchors` ClickHouse table; the source filters in Python down to
# (probes in AS16509 post-dedup, anchors in this fold's eval+fit sets).
#
# Requires (produced by `snakemake -s scripts/processing/ripe_atlas/process_probes_and_anchors.smk`):
#   - datasets/ripe_atlas/asn_corpora/probes/global/probes_of_as_16509.json
#   - datasets/ripe_atlas/asn_corpora/anchors/kfolds/anchor_fold_<0..4>.json
#
# Run with:
#   snakemake -s scripts/benchmark/v2/Snakefile \
#       --configfile scripts/benchmark/v2/config/global_as16509.yaml -j 4

run_id: global_as16509
source: ripe_atlas_asn_corpora
setup: probes_to_anchors
slices: [fold_0, fold_1, fold_2, fold_3, fold_4]

source_kwargs:
  probe_data_dir: datasets/ripe_atlas/asn_corpora/probes/global
  probe_asn: 16509
  anchor_data_dir: datasets/ripe_atlas/asn_corpora/anchors/kfolds
  max_rtt_ms: 10000          # RTT upper bound (ms) for compute_rtts_per_dst_src — matches the
                            # anchor-corpus reachability bound from select_probes_and_anchors.

enable_fallback: true
seed: 42

combos:
  - combo_id: vanilla_cbg
    ltd: low_envelope
    mtl: spherical_circle
    ctr: boundary_vertex_mean
    mtl_kwargs:
      speed_ratio: 0.6667
      enable_circle_filter: true