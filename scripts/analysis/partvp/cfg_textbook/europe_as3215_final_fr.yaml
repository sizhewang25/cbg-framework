run_id: europe_as3215_final_fr
source: ripe_atlas_asn_corpora
setup: probes_to_anchors
slices:
- fold_0
- fold_1
- fold_2
- fold_3
- fold_4
source_kwargs:
  probe_data_dir: datasets/ripe_atlas/asn_corpora/probes/europe
  probe_asn: 3215
  anchor_data_dir: datasets/ripe_atlas/asn_corpora/anchors/kfolds
  target_country: FR
  max_rtt_ms: 10000
enable_fallback: true
seed: 42
combos:
- combo_id: vanilla_cbg
  ltd: low_envelope
  mtl: spherical_circle
  ctr: boundary_vertex_mean
  mtl_kwargs:
    speed_ratio: 0.6667
    enable_circle_filter: true
- combo_id: million_scale_cbg
  ltd: speed_of_internet
  mtl: spherical_circle
  ctr: boundary_vertex_mean
  ltd_kwargs:
    speed_ratio: 0.6667
  mtl_kwargs:
    speed_ratio: 0.6667
    enable_circle_filter: true
- combo_id: octant_cbg
  ltd: bounded_spline
  mtl: planar_annulus_weighted
  ctr: monte_carlo_medoid
  ltd_kwargs:
    target_coverage: 0.9
    cutoff_min_points: 5
    fit_spline: true
    spline_n_knots: 4
    bin_size_ms: 5.0
  mtl_kwargs:
    n_pts: 64
    enable_circle_filter: true
    weight_tau_ms: 50.0
    weight_threshold: 0.9
  ctr_kwargs:
    n_samples: 1024
- combo_id: spotter_cbg
  ltd: normal_dist
  mtl: planar_annulus_weighted
  ctr: monte_carlo_medoid
  ltd_kwargs:
    n_bins: 40
    min_per_bin: 5
    deg_mu: 3
    deg_sigma: 2
    bin_size_ms: 5.0
    cutoff_min_points: 5
  mtl_kwargs:
    n_pts: 64
    enable_circle_filter: true
    weight_tau_ms: 50.0
    weight_threshold: 0.9
  ctr_kwargs:
    n_samples: 1024
outputs_root: scripts/benchmark/v2/outputs_partvp
