# Merged-folds analysis for the Spotter target_coverage sweep on the AS31898
# corpus. Covers two families per t-value:
#
#   • spotter_cbg_tNN          — planar_annulus (unweighted)
#   • spotter_cbg_weighted_tNN — planar_annulus_weighted (highest_weight_only)
#
# Concatenates per-target results from fold_0..fold_4 (disjoint K-fold test
# sets) and recomputes per-stage percentiles from raw — see scripts/analysis/Snakefile.
#
# Run with:
#   snakemake -s scripts/analysis/Snakefile \
#       --configfile scripts/analysis/config/global_as31898_spotter_sweep.yaml -j 3

run_id: global_as31898_spotter_sweep
source: ripe_atlas_asn_corpora
setup: probes_to_anchors
slices: []
merge_folds: true

group_by: none                 # 12 sweep variants share the same LTD; one CDF panel
phase_stat: p95
include_fit: true
runtime_stat: p50

combos:
  - spotter_cbg_t100
  - spotter_cbg_t90
  - spotter_cbg_t80
  - spotter_cbg_t70
  - spotter_cbg_t60
  - spotter_cbg_t50
  - spotter_cbg_weighted_t100
  - spotter_cbg_weighted_t90
  - spotter_cbg_weighted_t80
  - spotter_cbg_weighted_t70
  - spotter_cbg_weighted_t60
  - spotter_cbg_weighted_t50

# Global VP corpus: no continent split — AS31898 probes are spread across regions.

# Within each family, compare every off-baseline target_coverage to t90
# (k ≈ 1.645 on N(0,1) — closest analogue to Octant's target_coverage=0.9
# default). Across families, t90 vs weighted_t90 isolates the MTL choice.
diff_pairs:
  - [spotter_cbg_t100, spotter_cbg_t90]
  - [spotter_cbg_t80,  spotter_cbg_t90]
  - [spotter_cbg_t70,  spotter_cbg_t90]
  - [spotter_cbg_t60,  spotter_cbg_t90]
  - [spotter_cbg_t50,  spotter_cbg_t90]
  - [spotter_cbg_weighted_t100, spotter_cbg_weighted_t90]
  - [spotter_cbg_weighted_t80,  spotter_cbg_weighted_t90]
  - [spotter_cbg_weighted_t70,  spotter_cbg_weighted_t90]
  - [spotter_cbg_weighted_t60,  spotter_cbg_weighted_t90]
  - [spotter_cbg_weighted_t50,  spotter_cbg_weighted_t90]
  - [spotter_cbg_weighted_t90,  spotter_cbg_t90]
