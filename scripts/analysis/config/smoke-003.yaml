# Analysis-plots config for the smoke-003 benchmark run.
#
# Reproduces the three PNGs we wrote by hand against
# scripts/benchmark/v2/outputs/smoke-003/, but driven by Snakemake so the same
# config style as scripts/benchmark/v2/config/smoke.yaml carries over.
#
# Run with:
#   snakemake -s scripts/analysis/Snakefile \
#       --configfile scripts/analysis/config/smoke-003.yaml -j 3

run_id: smoke-003
source: vultr_csv
setup: anchors_to_probes       # match the benchmark run's setup_id
slices: [top1]

# Plot knobs
group_by: ltd                  # "ltd" = one CDF panel per LTD model; "none" = single panel
phase_stat: p95                # which per-stage summary stat to stack: p5/p25/p50/p75/p95/mean
include_fit: true              # add a FIT bar from each combo's run.json

# Pairs for the error-diff CDF. Each pair plots a CDF of (error_A − error_B);
# negative deltas = A is better. Here vanilla_cbg is the baseline.
diff_pairs:
  - [million_scale_cbg,   vanilla_cbg]
  - [octant_cbg,          vanilla_cbg]
  - [octant_weighted_cbg, vanilla_cbg]
