# Smoke configuration for the v2 CBG benchmark on RIPE Atlas data.
#
# Drives one source × five folds × one combo. The slice IS the fold:
# `slices: [fold_0, ..., fold_4]` materializes K=5 independent slices, each
# evaluated against the precomputed stratification at `source_kwargs.stratification_path`.
#
# Requires:
#  - ClickHouse reachable per CLICKHOUSE_HOST / CLICKHOUSE_PASSWORD (.env)
#  - datasets/ripe_atlas/stratifications/distgeo/k5_seed42_top20.json (produced by
#    `python -m scripts.processing.ripe_atlas.stratify --algo distgeo --k 5`)
#
# Run with:
#   snakemake -s scripts/benchmark/v2/Snakefile \
#       --configfile scripts/benchmark/v2/config/ripe-smoke.yaml -j 4

run_id: ripe-smoke-01
source: ripe_atlas
setup: probes_to_anchors
slices: [fold_0, fold_1, fold_2, fold_3, fold_4, all_folds]

# Plot knobs
group_by: ltd                  # "ltd" = one CDF panel per LTD model; "none" = single panel
phase_stat: p95                # which per-stage summary stat to stack: p5/p25/p50/p75/p95/mean
include_fit: true              # add a FIT bar from each combo's run.json
runtime_stat: p50              # plot_phase_runtime bars — median per-stage

# Combos to plot. Every analysis rule restricts to these via --combos.
# Leave empty (or remove the key) to include every combo on disk.
# When set, the combos referenced in diff_pairs must all appear here.
combos: []

# Pairs for the error-diff CDF. Each pair plots a CDF of (error_A − error_B);
# negative deltas = A is better. Here vanilla_cbg is the baseline.
diff_pairs:
  # ---- vs the vanilla CBG baseline ------------------------------------------
  - [million_scale_cbg,        vanilla_cbg]
  - [octant_cbg,               vanilla_cbg]
  - [spotter_cbg,              vanilla_cbg]