# Merged-folds analysis for the north_america_as7018 benchmark run.
#
# Concatenates per-target results from fold_0..fold_4 (disjoint K-fold test
# sets) and recomputes per-stage percentiles from raw — see scripts/analysis/Snakefile.
#
# Run with:
#   snakemake -s scripts/analysis/Snakefile \
#       --configfile scripts/analysis/config/north_america_as7018.yaml -j 3

run_id: north_america_as7018
source: ripe_atlas_asn_corpora
setup: probes_to_anchors
slices: []
merge_folds: true

group_by: ltd
phase_stat: p95
include_fit: true
runtime_stat: p50

# Combos to plot. Every analysis rule restricts to these via --combos.
# Leave the list empty (or remove the key) to include every combo on disk.
# When set, the combos referenced in diff_pairs must all appear here.
combos:
  # Circle family
  - vanilla_cbg
  - vanilla_cbg_centroid
  - vanilla_cbg_planar_centroid
  - million_scale_cbg
  - million_scale_cbg_centroid
  - million_scale_cbg_planar_centroid
  # Annulus family
  - octant_cbg
  - octant_cbg_centroid
  - octant_hull_cbg
  - octant_weighted_cbg
  - octant_hull_weighted_cbg
  - spotter_cbg
  - spotter_cbg_centroid
  - spotter_cbg_weighted

# Regional VP corpus: split SUCCESS CDFs by in-continent vs rest to surface
# the home-continent recovery / out-of-continent degradation expected from
# per-ASN fleets.
split_by_main_continent: north_america

diff_pairs:
  - [million_scale_cbg, vanilla_cbg]
  - [octant_cbg,        vanilla_cbg]
  - [spotter_cbg,       vanilla_cbg]

merge_pairs:
  - vanilla_cbg
  - million_scale_cbg
  - octant_cbg
  - spotter_cbg
