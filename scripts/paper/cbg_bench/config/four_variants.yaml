# Four fundamental CBG variants across the six *_final VP setups.
#
# Consumed by every scripts/paper/cbg_bench/ figure script via --config.
# Figures + their .json data dumps are written to scripts/paper/cbg_bench/<run_id>/.

run_id: four_variants

# v2 benchmark layout keys (shared by every setup).
source: ripe_atlas_asn_corpora
setup: probes_to_anchors
folds: [fold_0, fold_1, fold_2, fold_3, fold_4]

inputs_root: scripts/benchmark/v2/inputs
outputs_root: scripts/benchmark/v2/outputs

# The four fundamental variants (two clean within-pair LTD contrasts).
variants:
  - vanilla_cbg          # low_envelope    + spherical_circle + boundary_vertex_mean
  - million_scale_cbg    # speed_of_internet + spherical_circle + boundary_vertex_mean
  - octant_cbg_nofil     # bounded_spline  + planar_annulus (unweighted) + monte_carlo_medoid
  - spotter_cbg_nofil    # normal_dist     + planar_annulus (unweighted) + monte_carlo_medoid

# Percentiles for the summary table (deliverable 2).
percentiles: [5, 25, 50, 75, 95]

# Reference threshold lines (km) for CDF / per-target plots.
thresholds_km: [100, 500, 1000, 2500, 5000]

# Six VP setups: 2 US, 2 Europe, 2 Global. run_stem = benchmark run_id / config stem.
setups:
  - slug: as7018
    run_stem: north_america_as7018_final
    region: US
  - slug: as7922
    run_stem: north_america_as7922_final
    region: US
  - slug: as3209
    run_stem: europe_as3209_final
    region: Europe
  - slug: as3215
    run_stem: europe_as3215_final
    region: Europe
  - slug: as16509
    run_stem: global_as16509_final
    region: Global
  - slug: as31898
    run_stem: global_as31898_final
    region: Global
